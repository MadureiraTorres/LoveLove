<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para a Minha Pituca 💖</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Caveat:wght@700&family=Montserrat:wght@400;600&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #ffeef2;
            font-family: 'Montserrat', sans-serif;
            color: #5a3e45;
            overflow-x: hidden;
            position: relative;
        }

        /* Corações caindo no fundo */
        .heart-bg {
            position: fixed;
            top: -10%;
            font-size: 24px;
            animation: fall linear infinite;
            z-index: -1;
            opacity: 0.6;
            user-select: none;
        }

        @keyframes fall {
            to {
                transform: translateY(110vh) rotate(360deg);
            }
        }

        header {
            text-align: center;
            padding: 50px 20px;
            background: linear-gradient(135deg, #ffccd5 0%, #ffeef2 100%);
        }

        h1 {
            font-family: 'Caveat', cursive;
            font-size: 3.5rem;
            color: #d63384;
            margin-bottom: 10px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }

        .subtitle {
            font-size: 1.1rem;
            font-weight: 600;
            color: #774955;
            letter-spacing: 1px;
        }

        /* Contador */
        .counter-container {
            background: white;
            max-width: 600px;
            margin: -20px auto 40px auto;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(214, 51, 132, 0.1);
            text-align: center;
            border: 2px dashed #ffb3c1;
        }

        .counter-title {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 15px;
            color: #a26974;
            font-weight: bold;
        }

        .timer {
            display: table;
            width: 100%;
        }

        .time-box {
            display: table-cell;
            text-align: center;
            padding: 5px;
        }

        .time-box span {
            display: block;
            font-size: 1.8rem;
            font-weight: bold;
            color: #d63384;
        }

        .time-box label {
            font-size: 0.75rem;
            color: #8c5b66;
            text-transform: uppercase;
        }

        /* Mural de Polaroids */
        .mural-section {
            max-width: 1100px;
            margin: 0 auto;
            padding: 20px;
            text-align: center;
        }

        .mural-title {
            font-family: 'Caveat', cursive;
            font-size: 2.8rem;
            color: #c71585;
            margin-bottom: 40px;
        }

        .gallery {
            display: block;
            text-align: center;
        }

        .polaroid {
            display: inline-block;
            background: white;
            padding: 15px 15px 30px 15px;
            margin: 20px;
            box-shadow: 0 12px 25px rgba(0,0,0,0.1);
            border-radius: 4px;
            width: 260px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            text-decoration: none;
            color: inherit;
            vertical-align: top;
        }

        /* Efeito de inclinação aleatória nas fotos */
        .polaroid:nth-child(odd) {
            transform: rotate(-3deg);
        }
        .polaroid:nth-child(even) {
            transform: rotate(3deg);
        }

        .polaroid:hover {
            transform: scale(1.05) rotate(0deg) !important;
            box-shadow: 0 20px 35px rgba(214, 51, 132, 0.2);
            z-index: 10;
        }

        .photo-placeholder {
            width: 100%;
            height: 230px;
            background-color: #f7d6dc;
            border: 1px solid #e9b3bd;
            border-radius: 2px;
            display: table;
        }

        .photo-placeholder span {
            display: table-cell;
            vertical-align: middle;
            font-size: 0.85rem;
            color: #a26974;
            padding: 10px;
        }

        .caption {
            font-family: 'Caveat', cursive;
            font-size: 1.6rem;
            margin-top: 15px;
            color: #4a3338;
            word-wrap: break-word;
        }

        /* Elementos Fofos decorativos */
        .bunny-decor {
            text-align: center;
            margin: 40px 0;
            font-size: 3rem;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        footer {
            text-align: center;
            padding: 40px 20px;
            font-size: 0.9rem;
            color: #a26974;
            background-color: #fbc4d0;
            margin-top: 60px;
        }
    </style>
</head>
<body>

    <!-- Corações Animados via HTML puro/CSS (Gerados depois por JS) -->
    <div id="hearts-container"></div>

    <header>
        <h1>Obrigado por melhorar minha vida! 💖</h1>
        <p class="subtitle">Você é o meu melhor capítulo.</p>
    </header>

    <!-- CONTADOR EM TEMPO REAL -->
    <div class="counter-container">
        <div class="counter-title">Nosso Amor está crescendo há:</div>
        <div class="timer">
            <div class="time-box">
                <span id="years">00</span>
                <label>Anos</label>
            </div>
            <div class="time-box">
                <span id="months">00</span>
                <label>Meses</label>
            </div>
            <div class="time-box">
                <span id="days">00</span>
                <label>Dias</label>
            </div>
            <div class="time-box">
                <span id="hours">00</span>
                <label>Horas</label>
            </div>
            <div class="time-box">
                <span id="minutes">00</span>
                <label>Min</label>
            </div>
            <div class="time-box">
                <span id="seconds">00</span>
                <label>Seg</label>
            </div>
        </div>
    </div>

    <!-- DECORAÇÃO DE COELHOS -->
    <div class="bunny-decor">
        🐇✨🐹🎈🐰
    </div>

    <!-- MURAL POLAROID -->
    <main class="mural-section">
        <h2 class="mural-title">Nossos Momentos Favoritos 📸</h2>
        
        <div class="gallery">
            <div class="polaroid">
                <img src="WhatsApp Image 2026-04-02 at 23.31.46.jpeg" alt="TE AMOOO!!!" style="width: 100%; height: 230px; object-fit: cover; border-radius: 2px;">
                <div class="caption">Sempre Juntos</div>
            </div>

            <div class="polaroid">
                <img src="WhatsApp Image 2026-06-27 at 20.57.28.jpeg" alt="TE AMOOO!!!" style="width: 100%; height: 230px; object-fit: cover; border-radius: 2px;">
                <div class="caption">Seu sorriso lindo</div>
            </div>

            <div class="polaroid">
                <img src="WhatsApp Image 2026-06-27 at 20.58.26.jpeg" alt="TE AMOOO!!!" style="width: 100%; height: 230px; object-fit: cover; border-radius: 2px;">
                <div class="caption">A melhor companhia</div>
            </div>

            <div class="polaroid">
                 <img src="ChatGPT Image 24 de set. de 2025, 00_00_16.png" alt="TOELHO" style="width: 100%; height: 230px; object-fit: cover; border-radius: 2px;">
                <div class="caption">TOELHO!!!</div>
            </div>
        </div>
    </main>

    <footer>
        <p>Feito com todo o amor do mundo para minha Jojoca 🤍</p>
        <p style="margin-top: 10px; font-size: 1.2rem;">₍⑅ᐢ..ᐢ₎ ✨ 🐇</p>
    </footer>

    <script>
        const startDate = new Date(2024, 7, 12, 23, 0, 0); 

        function updateTimer() {
            const now = new Date();
            let diff = now - startDate;

            // Cálculos aproximados e bonitos de tempo corrido
            const totalSeconds = Math.floor(diff / 1000);
            const totalMinutes = Math.floor(totalSeconds / 60);
            const totalHours = Math.floor(totalMinutes / 60);
            const totalDays = Math.floor(totalHours / 24);

            // Cálculo exato de anos/meses/dias para ficar perfeito
            let years = now.getFullYear() - startDate.getFullYear();
            let months = now.getMonth() - startDate.getMonth();
            let days = now.getDate() - startDate.getDate();

            if (days < 0) {
                months--;
                // Pega o último dia do mês anterior
                const prevMonth = new Date(now.getFullYear(), now.getMonth(), 0);
                days += prevMonth.getDate();
            }
            if (months < 0) {
                years--;
                months += 12;
            }

            const hours = now.getHours() - startDate.getHours();
            const minutes = now.getMinutes() - startDate.getMinutes();
            const seconds = now.getSeconds() - startDate.getSeconds();

            // Ajustando os negativos das horas/minutos
            const displayHours = hours < 0 ? (24 + hours) : hours;
            const displayMinutes = minutes < 0 ? (60 + minutes) : minutes;
            const displaySeconds = seconds < 0 ? (60 + seconds) : seconds;

            document.getElementById('years').innerText = String(years).padStart(2, '0');
            document.getElementById('months').innerText = String(months).padStart(2, '0');
            document.getElementById('days').innerText = String(days).padStart(2, '0');
            document.getElementById('hours').innerText = String(displayHours).padStart(2, '0');
            document.getElementById('minutes').innerText = String(displayMinutes).padStart(2, '0');
            document.getElementById('seconds').innerText = String(displaySeconds).padStart(2, '0');
        }

        // Atualiza a cada segundo
        setInterval(updateTimer, 1000);
        updateTimer();

        // EFEITO DE CORAÇÕES VOANDO DE FUNDO
        const heartsContainer = document.getElementById('hearts-container');
        const heartEmojis = ['💖', '🐰', '💗', '🐇', '💝', '✨'];
        
        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart-bg');
            heart.innerText = heartEmojis[Math.floor(Math.random() * heartEmojis.length)];
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = (Math.random() * 3 + 3) + 's'; // Entre 3 e 6s
            heart.style.fontSize = (Math.random() * 15 + 15) + 'px'; // Entre 15 e 30px
            
            heartsContainer.appendChild(heart);

            // Remove depois que sair da tela
            setTimeout(() => {
                heart.remove();
            }, 6000);
        }

        // Cria corações continuamente
        setInterval(createHeart, 400);
    </script>
</body>
</html>
